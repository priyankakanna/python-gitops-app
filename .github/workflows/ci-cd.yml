name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repo code
      - name: Checkout code
        uses: actions/checkout@v3

      # 2️⃣ Set up Docker Buildx (optional but recommended)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # 3️⃣ Log in to GHCR using PAT
      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: priyankakanna
          password: ${{ secrets.GHCR_PAT }}

      # 4️⃣ Build Docker image
      - name: Build Docker image
        run: |
          docker build -t ghcr.io/priyankakanna/python-gitops-app:v1 .

      # 5️⃣ Tag Docker image with safe commit SHA
      - name: Tag Docker image with commit SHA
        run: |
          SHA=$(echo $GITHUB_SHA | cut -c1-7 | tr -d '\n')
          echo "SHA tag: $SHA"
          if [[ -n "$SHA" ]]; then
            docker tag ghcr.io/priyankakanna/python-gitops-app:v1 ghcr.io/priyankakanna/python-gitops-app:$SHA
          fi

      # 6️⃣ Push Docker images to GHCR
      - name: Push Docker images
        run: |
          docker push ghcr.io/priyankakanna/python-gitops-app:v1
          SHA=$(echo $GITHUB_SHA | cut -c1-7 | tr -d '\n')
          if [[ -n "$SHA" ]]; then
            docker push ghcr.io/priyankakanna/python-gitops-app:$SHA
          fi
