name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # 3️⃣ Log in to GHCR
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: priyankakanna
          password: ${{ secrets.GHCR_PAT }}

      # 4️⃣ Build Docker image with SHA tag
      - name: Build Docker image
        run: |
          SHA=$(echo $GITHUB_SHA | cut -c1-7)
          docker build -t ghcr.io/priyankakanna/python-gitops-app:$SHA .

      # 5️⃣ Push Docker image to GHCR
      - name: Push Docker image
        run: |
          SHA=$(echo $GITHUB_SHA | cut -c1-7)
          docker push ghcr.io/priyankakanna/python-gitops-app:$SHA

      # 6️⃣ Set up kind (Kubernetes in Docker)
      - name: Set up kind
        uses: helm/kind-action@v1.2.1
        with:
          version: v0.20.0

      # 7️⃣ Create kind cluster
      - name: Create kind cluster
        run: |
          kind create cluster --name ci-cd-cluster

      # 8️⃣ Set up kubectl context
      - name: Set up kubectl
        run: |
          kubectl cluster-info --context kind-ci-cd-cluster

      # 9️⃣ Set up Helm
      - name: Set up Helm
        uses: azure/setup-helm@v3

      # 🔟 Deploy Helm chart to kind
      - name: Deploy Helm chart
        run: |
          SHA=$(echo $GITHUB_SHA | cut -c1-7)
          helm upgrade --install python-gitops-app ./python-gitops-app \
            --set image.repository=ghcr.io/priyankakanna/python-gitops-app \
            --set image.tag=$SHA \
            --wait

      # 1️⃣1️⃣ Verify deployment
      - name: Check pods
        run: kubectl get pods -o wide

      - name: Check services
        run: kubectl get svc
