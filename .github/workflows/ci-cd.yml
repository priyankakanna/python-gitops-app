name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout code
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # 3️⃣ Log in to GHCR
      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: priyankakanna
          password: ${{ secrets.GHCR_PAT }}

      # 4️⃣ Build Docker image with commit SHA
      - name: Build Docker image
        run: |
          SHA=$(echo $GITHUB_SHA | cut -c1-7 | tr -d '\n')
          docker build -t ghcr.io/priyankakanna/python-gitops-app:$SHA .

      # 5️⃣ Push Docker image to GHCR
      - name: Push Docker image
        run: |
          SHA=$(echo $GITHUB_SHA | cut -c1-7 | tr -d '\n')
          docker push ghcr.io/priyankakanna/python-gitops-app:$SHA

      # 6️⃣ (Optional) Push v1 tag
      - name: Tag and push v1
        run: |
          docker tag ghcr.io/priyankakanna/python-gitops-app:$SHA ghcr.io/priyankakanna/python-gitops-app:v1
          docker push ghcr.io/priyankakanna/python-gitops-app:v1
