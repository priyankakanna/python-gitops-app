name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # Checkout code
      - name: Checkout code
        uses: actions/checkout@v3

      # Log in to GitHub Container Registry using PAT
      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: priyankakanna
          password: ${{ secrets.GHCR_PAT }}

      # Build Docker image
      - name: Build Docker image
        run: |
          docker build -t ghcr.io/priyankakanna/python-gitops-app:v1 .

      # Tag Docker image with commit SHA (safe)
      - name: Tag Docker image with commit SHA
        run: |
          SHA=$(echo $GITHUB_SHA | cut -c1-7 | tr -d '\n')
          echo "SHA tag: $SHA"
          docker tag ghcr.io/priyankakanna/python-gitops-app:v1 ghcr.io/priyankakanna/python-gitops-app:$SHA

      # Push Docker images
      - name: Push Docker images
        run: |
          docker push ghcr.io/priyankakanna/python-gitops-app:v1
          docker push ghcr.io/priyankakanna/python-gitops-app:$SHA
