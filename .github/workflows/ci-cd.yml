name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout code
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # 3️⃣ Log in to GHCR
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: priyankakanna
          password: ${{ secrets.GHCR_PAT }}

      # 4️⃣ Build Docker image
      - name: Build Docker image
        run: |
          SHA=$(echo $GITHUB_SHA | cut -c1-7)
          docker build -t ghcr.io/priyankakanna/python-gitops-app:$SHA .

      # 5️⃣ Push Docker image
      - name: Push Docker image to GHCR
        run: |
          SHA=$(echo $GITHUB_SHA | cut -c1-7)
          docker push ghcr.io/priyankakanna/python-gitops-app:$SHA

      # 6️⃣ Set up Helm
      - name: Set up Helm
        uses: azure/setup-helm@v3

      # 7️⃣ Deploy to Minikube with Helm
      - name: Deploy to Kubernetes via Helm
        run: |
          SHA=$(echo $GITHUB_SHA | cut -c1-7)

          # Start Minikube if not running
          minikube start --driver=docker

          # Deploy Helm chart with dynamic image tag
          helm upgrade --install python-gitops-app ./python-gitops-app \
            --set image.repository=ghcr.io/priyankakanna/python-gitops-app \
            --set image.tag=$SHA \
            --wait

          # Show pods & services
          kubectl get pods
          kubectl get svc
