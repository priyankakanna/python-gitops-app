name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout source code
      - name: Checkout code
        uses: actions/checkout@v3

      # 2️⃣ Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # 3️⃣ Log in to GHCR
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: priyankakanna
          password: ${{ secrets.GHCR_PAT }}

      # 4️⃣ Build Docker image with commit SHA tag
      - name: Build Docker image
        run: |
          SHA=$(echo $GITHUB_SHA | cut -c1-7)
          docker build -t ghcr.io/priyankakanna/python-gitops-app:$SHA .

      # 5️⃣ Push Docker image to GHCR
      - name: Push Docker image
        run: |
          SHA=$(echo $GITHUB_SHA | cut -c1-7)
          docker push ghcr.io/priyankakanna/python-gitops-app:$SHA

      # 6️⃣ Set up a kind cluster
      - name: Setup kind
        uses: mirromutth/setup-kind@v1
        with:
          kind-version: "v0.20.0"

      # 7️⃣ Set up kubectl
      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: "latest"

      # 8️⃣ Set up Helm
      - name: Set up Helm
        uses: azure/setup-helm@v3

      # 9️⃣ Deploy with Helm
      - name: Deploy Helm Chart
        run: |
          SHA=$(echo $GITHUB_SHA | cut -c1-7)
          helm upgrade --install python-gitops-app ./python-gitops-app \
            --set image.repository=ghcr.io/priyankakanna/python-gitops-app \
            --set image.tag=$SHA \
            --wait

      # 🔟 Verification
      - name: Show Pods
        run: kubectl get pods -o wide

      - name: Show Services
        run: kubectl get svc
