name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repo
      - name: Checkout code
        uses: actions/checkout@v3

      # 2️⃣ Set up Docker builder
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # 3️⃣ Log in to GitHub Container Registry
      - name: Login to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: priyankakanna
          password: ${{ secrets.GHCR_PAT }}

      # 4️⃣ Build and tag Docker image
      - name: Build Docker image
        run: |
          SHA=$(echo $GITHUB_SHA | cut -c1-7)
          docker build -t ghcr.io/priyankakanna/python-gitops-app:$SHA .

      # 5️⃣ Push image to GHCR
      - name: Push Docker image
        run: |
          SHA=$(echo $GITHUB_SHA | cut -c1-7)
          docker push ghcr.io/priyankakanna/python-gitops-app:$SHA

      # 6️⃣ Set up kind cluster
      - name: Set up kind cluster
        uses: helm/kind-action@v1.2.1
        with:
          kind-version: "v0.20.0"
          cluster-name: "ci-cd-cluster"

      # 7️⃣ Set up kubectl
      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: "latest"

      # 8️⃣ Set up Helm
      - name: Set up Helm
        uses: azure/setup-helm@v3

      # 9️⃣ Deploy via Helm
      - name: Deploy Helm chart
        run: |
          SHA=$(echo $GITHUB_SHA | cut -c1-7)
          helm upgrade --install python-gitops-app ./python-gitops-app \
            --set image.repository=ghcr.io/priyankakanna/python-gitops-app \
            --set image.tag=$SHA \
            --wait

      # 🔟 Verify deployment
      - name: Get pods
        run: kubectl get pods -o wide

      - name: Get services
        run: kubectl get svc
